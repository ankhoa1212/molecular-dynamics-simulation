name: Pylint & Black

on:
  push:
    paths:
      - "**/*.py"
  pull_request:
    paths:
      - "**/*.py"
  workflow_dispatch:

env:
  INSTALL_DATA_SETUP_DEPS: "false"
  INSTALL_RF_DETR_DEPS: "false"
  INSTALL_LAMMPS_DEPS: "false"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies and tools
        run: |
          python -m pip install --upgrade pip setuptools
          pip install pylint black
          [ -f requirements.txt ] && pip install -r requirements.txt
          [ "$INSTALL_DATA_SETUP_DEPS" = "true" ] && [ -f data-setup/requirements.txt ] && pip install -r data-setup/requirements.txt
          [ -f yolov12/pyproject.toml ] && pip install -e yolov12
          [ "$INSTALL_RF_DETR_DEPS" = "true" ] && [ -f rf-detr/pyproject.toml ] && pip install -e rf-detr

      - name: Determine files to lint
        id: files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1
            FILES=$(git diff --name-only origin/${{ github.base_ref }} -- | grep '\.py$' || true)
            echo "scope=PR (changed files only)" >> $GITHUB_OUTPUT
          else
            FILES=$(git ls-files '*.py')
            echo "scope=Full repository" >> $GITHUB_OUTPUT
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check Black formatting
        if: steps.files.outputs.files != ''
        run: |
          echo "${{ steps.files.outputs.files }}" | xargs black --check --line-length=100

      - name: Run pylint
        id: pylint
        if: steps.files.outputs.files != ''
        continue-on-error: true
        run: |
          mkdir -p lint-reports
          echo "${{ steps.files.outputs.files }}" | xargs pylint --jobs=0 --rcfile=.pylintrc \
            --output-format=json:lint-reports/pylint.json,text:lint-reports/pylint.txt || true

      - name: Generate lint summary
        if: always() && steps.files.outputs.files != ''
        run: |
          python << 'EOF'
          import json, os, sys
          report_file = "lint-reports/pylint.json"
          if not os.path.exists(report_file):
              print("### Pylint: No report found")
              sys.exit(0)
          with open(report_file) as f:
              try:
                  results = json.load(f)
              except:
                  results = []
          
          stats = {}
          for msg in results:
              t = msg.get("type", "unknown")
              stats[t] = stats.get(t, 0) + 1
          
          summary = [f"## Pylint Summary", f"**Scope:** ${{ steps.files.outputs.scope }}", f"**Total Issues:** {len(results)}\n"]
          if stats:
              summary.extend([f"- **{k}**: {v}" for k, v in sorted(stats.items())])
          else:
              summary.append("✅ No issues found!")
          
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write("\n".join(summary))
          EOF

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: lint-reports/
          retention-days: 30

  lint-lammps:
    # Fixed the 'env' context error here
    if: env.INSTALL_LAMMPS_DEPS == 'true' || vars.INSTALL_LAMMPS_DEPS == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"

      - name: Install lammps deps
        run: |
          pip install pylint
          [ -f lammps-scripts/requirements.txt ] && pip install -r lammps-scripts/requirements.txt

      - name: Run pylint for lammps-scripts
        continue-on-error: true
        run: |
          FILES=$(git ls-files | grep '^lammps-scripts/.*\.py$' || true)
          if [ -z "$FILES" ]; then exit 0; fi
          mkdir -p lint-reports-lammps
          echo "$FILES" | xargs pylint --jobs=0 --rcfile=.pylintrc \
            --output-format=json:lint-reports-lammps/pylint.json,text:lint-reports-lammps/pylint.txt || true

      - name: Upload lammps lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports-lammps
          path: lint-reports-lammps/
