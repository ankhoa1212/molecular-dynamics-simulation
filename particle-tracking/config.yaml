# Particle Tracking Configuration
# All paths are relative to the particle-tracking/ directory unless absolute.
# CLI arguments always override values set here.

# --- Input ---
input: data/raw/your_video.tif   # path to video, TIFF stack, or folder of images

# --- Model ---
model:
  # Which detection backend to use: rf-detr | yolo | lodestar
  type: rf-detr

  # RF-DETR checkpoint (trained weights from models/rf_detr/checkpoints/)
  checkpoint: models/rf_detr/checkpoints/checkpoint_best_ema.pth

  # RF-DETR model size: nano | small | medium | large
  # Only used when model.type is rf-detr
  variant: large

  # Inference device: "0" for first GPU, "cpu" for CPU-only
  device: "0"

# --- Detection ---
detection:
  # Confidence threshold for keeping a detection (0.0–1.0)
  threshold: 0.25

# --- Tracking ---
tracking:
  # Tracking algorithm: trackpy (default, offline) | bytetrack (online)
  tracker: trackpy

  # Trackpy: maximum pixel distance a particle can move between frames
  search_range: 10.0

  # Trackpy: number of consecutive frames a particle may be missing before its track ends
  memory: 3

  # Trackpy: discard tracks shorter than this many frames (0 = keep all)
  stub_filter: 5

# --- Output ---
output:
  dir: evaluation/results/tracking_output

  # Save an annotated MP4 with bounding boxes and track IDs drawn
  save_video: false

  fps: 30
