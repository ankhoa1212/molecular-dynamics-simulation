dataset:
  path: /mnt/d/Particle Tracking Data/2um-rf-detr/          # directory containing images/ and annotations.json
  train_experiments:
    - train1
  val_experiments:
    - val1
  test_experiments:
    - test1

model:
  variant: large                   # base | large

training:
  epochs: 50
  batch_size: 4
  grad_accum_steps: 4
  learning_rate: 1.0e-4
  checkpoint_dir: checkpoints

mlflow:
  experiment_name: rf-detr
