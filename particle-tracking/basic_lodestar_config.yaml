# Particle Tracking Configuration — LodeSTAR detector
# All paths are relative to the particle-tracking/ directory unless absolute.
# CLI arguments always override values set here.

# Input: path to video, TIFF stack, or folder of images
input: "/mnt/d/Particle Tracking Data/5um/70% Intensity PS 5um Video Trial 1_1_MMStack_Default.ome.tif"

# Model:
model:
  type: lodestar

  checkpoint: ../data-setup/models/lodestar_model_15/model.pt

  device: "0"  # "0" for first GPU, "cpu" for CPU-only

# Detection:
detection:
  # LodeSTAR cutoff uses mode="ratio": fraction of the per-frame max score.
  threshold: 0.1   # from autolabel_2um_lodestar_model_15.json (cutoff)
  alpha: 0.9        # weight score exponent (autolabel default)
  nms_distance: 30  # suppress detections within 30px of a higher-scoring one
  fp16: true        # run model in float16

# Tracking:
tracking:
  tracker: trackpy  # trackpy (default, offline) | bytetrack (online)

  # Trackpy: maximum pixel distance a particle can move between frames
  search_range: 10.0

  # Trackpy: number of consecutive frames a particle may be missing before its track ends
  memory: 5

  # Trackpy: discard tracks shorter than this many frames (0 = keep all)
  stub_filter: 3

  # Trackpy: use adaptive search in dense scenes (reduces search_range if too many candidates)
  adaptive_stop: 1.0  # minimum search_range before giving up (set to null to disable)
  adaptive_step: 0.95  # multiplicative factor to shrink search_range per attempt

  # ByteTrack: frames to keep a lost track alive before discarding it
  lost_track_buffer: 60

  # ByteTrack: consecutive frames a detection must appear before a track is confirmed
  minimum_consecutive_frames: 1

  # ByteTrack: minimum detection confidence to activate a new track (0.0–1.0)
  track_activation_threshold: 0.1

# Output:
output:
  dir: /mnt/d/Particle Tracking Data/5um/lodestar/

  save_video: true  # Save an annotated MP4 with bounding boxes and track IDs drawn

  fps: 30

  # Number of historical frames shown as a trail per trajectory in the output video
  trace_length: 60
