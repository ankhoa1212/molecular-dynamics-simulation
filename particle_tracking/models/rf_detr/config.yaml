dataset:
  path: "/mnt/d/Particle Tracking Data/2um-rf-detr/"    # directory containing images/ and annotations.json
  train_experiments:
    - train1
  val_experiments:
    - val1
  test_experiments:
    - test1

model:
  variant: large                   # base | large

training:
  epochs: 50
  batch_size: 1
  grad_accum_steps: 16
  learning_rate: 1.0e-4
  num_workers: 4
  pin_memory: true
  checkpoint_dir: checkpoints

mlflow:
  experiment_name: rf-detr
